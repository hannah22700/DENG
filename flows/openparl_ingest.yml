id: openparl_ingest
namespace: deng
description: |
  Fetches votes and voting data from the Swiss Parliament API (swissparlpy)
  and ingests them into the PostgreSQL. The third task aggregates and stores 
  individual voting records into a per-party summary for each vote.

# Sharing resources across our different tasks
variables:
  db_url: "postgresql://root:root@pgdatabase:5432/openparl"
  chunksize: 100000

inputs:
  - id: num_votes
    type: SELECT
    displayName: Select the number of votes
    values: ["10", "50", "100", "250", "1000"]
    defaults: "100"

tasks:
  - id: ingest_votes
    type: io.kestra.plugin.scripts.python.Script
    outputFiles:
      - "*.pkl"
    script: |
      import dataconnector as dc
      import datatransform as dt
      import dataingest as di
      import pandas as pd
      from sqlalchemy import create_engine

      # We create the access point to our database
      engine = create_engine('{{ vars.db_url }}')

      # We fetch the votes from the Swiss Parliament API
      votes = dc.get_votes()
      
      # We stick them into a Pandas dataframe
      dfvotes = pd.DataFrame(votes)

      # We drop languages, as we only use German version of votes
      dfvotes = dt.clean_up_votes(dfvotes)

      # We ingest the votes into our postgresql db
      di.ingest_data(
        engine=engine,
        target_table='votes',
        chunksize={{ vars.chunksize }},
        data = dfvotes
      )

      dfvotes.to_pickle('votes.pkl')
      print("Finished Ingesting Votes")

  - id: ingest_voting
    type: io.kestra.plugin.scripts.python.Script
    inputFiles:
      votes.pkl: "{{ outputs.ingest_votes.outputFiles['votes.pkl'] }}"
    outputFiles:
      - "*.pkl"
    script: |
      import swissparlpy as spp
      import pandas as pd
      import os
      import dataconnector as dc
      import datatransform as dt
      import dataingest as di
      from sqlalchemy import create_engine

      # We create the access point to our database
      engine = create_engine('{{ vars.db_url }}')

      __location__ = os.path.realpath(os.getcwd())
      path = os.path.join(__location__, "voting")

      # Get the votes from the pickle file (output of last task)
      dfvotes = pd.read_pickle('votes.pkl')
      
      # We get the individual votings out of the votes
      dfvoting = dc.get_voting_of_votes(dfvotes.head({{ inputs.num_votes }}).to_dict('records'), path)
      
      # Dropping columns, cleaning up
      dfvoting = dt.clean_up_voting(dfvoting)

      di.ingest_data(
          engine=engine,
          target_table='voting',
          chunksize={{ vars.chunksize }},
          data = dfvoting
      )

      dfvoting.to_pickle('dfvoting.pkl')

      print("Finished Ingesting Votings")

  - id: aggregate_party_summary
    type: io.kestra.plugin.scripts.python.Script
    inputFiles:
      dfvoting.pkl: "{{ outputs.ingest_voting.outputFiles['dfvoting.pkl'] }}"
    script: |
      import swissparlpy as spp
      import pandas as pd
      from sqlalchemy import create_engine
      import os

      import datatransform as dt
      import dataingest as di

      # We get the pickel from the last task and stick it into a dataframe
      dfvoting = pd.read_pickle('dfvoting.pkl')
      
      # PostgreSQL Database 
      engine = create_engine('{{ vars.db_url }}')

      # We aggregate the party summary... 
      dfpartysummary = dt.create_party_summary(dfvoting)

      # ...and ingest it into our database
      di.ingest_data(
          engine=engine,
          target_table='partysummary',
          chunksize={{ vars.chunksize }},
          data = dfpartysummary
      )

      print("Finished Ingesting Party Summary")

pluginDefaults: 
  - type: io.kestra.plugin.scripts.python.Script
    values:
      taskRunner:
        type: io.kestra.plugin.scripts.runner.docker.Docker
        networkMode: deng_default
        pullPolicy: NEVER
      containerImage: openparl-kestra:latest
      inputFiles:   
        dataingest.py: "file:///app/scripts/dataingest.py"
        datatransform.py: "file:///app/scripts/datatransform.py"
        dataconnector.py: "file:///app/scripts/dataconnector.py"

triggers:
  - id: weekly_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 6 * * 1"  # Every Monday, 6 AM